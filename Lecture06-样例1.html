<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFA Pumping 演示</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5b6475;
      --line: #d8deea;
      --accent: #6d28d9;
      --accent-soft: #efe7ff;
      --ok: #0f9d58;
      --warn: #d97706;
      --bad: #c62828;
      --pump: #fff0b3;
      --pump-border: #d4a800;
      --state-hit: #e0f2fe;
      --state-repeat: #fde2e1;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(39, 57, 104, 0.06);
      padding: 18px;
    }

    .card h2 {
      font-size: 20px;
      margin: 0 0 12px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    input[type="text"] {
      flex: 1 1 340px;
      min-width: 240px;
      font-size: 20px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      outline: none;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.12);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform .05s ease, opacity .2s ease;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: translateY(1px); }
    button.secondary {
      background: #eef2ff;
      color: #392a77;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .examples button {
      padding: 7px 12px;
      font-size: 14px;
      border-radius: 999px;
      background: #f2f4fb;
      color: #334155;
      border: 1px solid var(--line);
    }

    .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 600;
    }

    .status.ok { background: #ecfdf3; color: var(--ok); border: 1px solid #b7ebc8; }
    .status.warn { background: #fff8eb; color: var(--warn); border: 1px solid #f0d6a3; }
    .status.bad { background: #fef1f1; color: var(--bad); border: 1px solid #f2c2c2; }

    .seg {
      font-family: "SFMono-Regular", Consolas, Monaco, monospace;
      font-size: 24px;
      margin: 14px 0 8px;
      letter-spacing: 1px;
      word-break: break-all;
    }

    .piece {
      display: inline-block;
      padding: 3px 4px;
      border-radius: 8px;
      min-width: 0.6em;
    }
    .piece.pump {
      background: var(--pump);
      outline: 2px solid var(--pump-border);
    }

    .xyz {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .xyz .box {
      background: #fafbff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .xyz .lab {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 3px;
    }

    .mono {
      font-family: "SFMono-Regular", Consolas, Monaco, monospace;
      font-size: 18px;
      word-break: break-all;
    }

    .explain {
      margin-top: 12px;
      background: #faf7ff;
      border: 1px solid #e8dcff;
      border-radius: 14px;
      padding: 12px 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 15px;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    th { background: #f8fafc; }
    tr:last-child td { border-bottom: none; }

    .candidate-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .candidate {
      padding: 10px 12px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 15px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      border-radius: 50%;
      vertical-align: -1px;
      border: 1px solid #9ca3af;
      background: white;
    }

    .legend .hit::before { background: var(--state-hit); }
    .legend .repeat::before { background: var(--state-repeat); }

    svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
      background: linear-gradient(180deg, #fff, #fcfcff);
    }

    .state-circle {
      fill: #fffdf6;
      stroke: #7a6f44;
      stroke-width: 2;
      transition: fill .2s ease, stroke .2s ease;
    }

    .state-outer {
      fill: none;
      stroke: #7a6f44;
      stroke-width: 2;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .state-label {
      font-size: 22px;
      font-style: italic;
    }

    .edge, .loop {
      fill: none;
      stroke: #111827;
      stroke-width: 2.2;
      marker-end: url(#arrow);
    }

    .edge-label {
      font-size: 18px;
      font-weight: 600;
    }

    .hit circle.state-circle { fill: var(--state-hit); }
    .repeat circle.state-circle { fill: var(--state-repeat); stroke: #c0362c; }
    .repeat circle.state-outer { opacity: 1; }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .xyz { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>DFA“pumping”可视化演示</h1>
    <div class="sub">先画出 DFA，再输入一个 0/1 串。页面会判断该串是否被接受，并在满足条件时给出一个可泵分解 <span class="mono">w = xyz</span>，高亮其中应被“泵”的部分 <span class="mono">y</span>。</div>

    <div class="grid">
      <section class="card">
        <h2>1. DFA 图</h2>
        <svg viewBox="0 0 760 300" aria-label="DFA 图">
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L8,3 z" fill="#111827"></path>
            </marker>
          </defs>

          <path d="M40 160 L130 160" class="edge"></path>

          <g id="state-q0" class="state-group">
            <circle class="state-circle" cx="170" cy="160" r="42"></circle>
            <circle class="state-outer" cx="170" cy="160" r="47"></circle>
            <text class="state-label" x="170" y="170" text-anchor="middle">q<tspan baseline-shift="sub" font-size="15">0</tspan></text>
          </g>

          <g id="state-q1" class="state-group">
            <circle class="state-circle" cx="380" cy="160" r="42"></circle>
            <circle class="state-outer" cx="380" cy="160" r="47"></circle>
            <text class="state-label" x="380" y="170" text-anchor="middle">q<tspan baseline-shift="sub" font-size="15">1</tspan></text>
          </g>

          <g id="state-q2" class="state-group">
            <circle class="state-circle" cx="600" cy="160" r="42"></circle>
            <circle class="state-outer" cx="600" cy="160" r="47"></circle>
            <circle class="state-outer" cx="600" cy="160" r="51" style="opacity:1"></circle>
            <text class="state-label" x="600" y="170" text-anchor="middle">q<tspan baseline-shift="sub" font-size="15">2</tspan></text>
          </g>

          <path d="M212 160 L338 160" class="edge"></path>
          <path d="M422 160 L558 160" class="edge"></path>

          <path d="M150 118 C120 70, 220 70, 190 118" class="loop"></path>
          <path d="M360 118 C330 70, 430 70, 400 118" class="loop"></path>
          <path d="M580 118 C550 70, 650 70, 620 118" class="loop"></path>

          <text class="edge-label" x="275" y="147" text-anchor="middle">0</text>
          <text class="edge-label" x="490" y="147" text-anchor="middle">1</text>
          <text class="edge-label" x="170" y="62" text-anchor="middle">1</text>
          <text class="edge-label" x="380" y="62" text-anchor="middle">0</text>
          <text class="edge-label" x="600" y="62" text-anchor="middle">0,1</text>
        </svg>
        <div class="legend">
          <span class="hit">运行过程中访问过的状态</span>
          <span class="repeat">被选中的重复状态</span>
        </div>
        <div class="footer-note">该 DFA 接受的语言：所有包含子串 <span class="mono">01</span> 的二进制串。</div>
      </section>

      <section class="card">
        <h2>2. 输入与分析</h2>
        <div class="input-row">
          <input id="wordInput" type="text" placeholder="请输入 0/1 串，例如 101 或 0011" value="101" />
          <button id="analyzeBtn">分析</button>
          <button id="clearBtn" class="secondary">清空</button>
        </div>
        <div class="examples">
          <button type="button" data-example="101">101</button>
          <button type="button" data-example="001">001</button>
          <button type="button" data-example="010">010</button>
          <button type="button" data-example="0101">0101</button>
          <button type="button" data-example="11101">11101</button>
          <button type="button" data-example="01">01</button>
          <button type="button" data-example="111">111</button>
        </div>
        <div class="note">说明：这里默认采用该 DFA 的状态数 <span class="mono">p = 3</span> 作为 pumping length，并在前 <span class="mono">p</span> 个字符内寻找重复状态。</div>

        <div id="statusBox" class="status ok">准备就绪。</div>

        <div id="segArea"></div>
        <div id="xyzArea"></div>
        <div id="explainArea"></div>
        <div id="candidatesArea"></div>
      </section>
    </div>

    <section class="card" style="margin-top:18px;">
      <h2>3. 运行轨迹</h2>
      <div class="small">表中“位置 i”表示已经读入前 <span class="mono">i</span> 个字符后所在的状态。</div>
      <div id="runTable"></div>
    </section>
  </div>

  <script>
    const delta = {
      q0: { '0': 'q1', '1': 'q0' },
      q1: { '0': 'q1', '1': 'q2' },
      q2: { '0': 'q2', '1': 'q2' }
    };

    const P = 3;

    const wordInput = document.getElementById('wordInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusBox = document.getElementById('statusBox');
    const segArea = document.getElementById('segArea');
    const xyzArea = document.getElementById('xyzArea');
    const explainArea = document.getElementById('explainArea');
    const runTable = document.getElementById('runTable');
    const candidatesArea = document.getElementById('candidatesArea');

    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showStatus(type, text) {
      statusBox.className = 'status ' + type;
      statusBox.textContent = text;
    }

    function simulate(word) {
      let state = 'q0';
      const states = ['q0'];
      const transitions = [];
      for (let i = 0; i < word.length; i++) {
        const ch = word[i];
        const from = state;
        state = delta[state][ch];
        const to = state;
        states.push(to);
        transitions.push({ step: i + 1, ch, from, to });
      }
      return { states, transitions, accepted: state === 'q2', finalState: state };
    }

    function findCandidates(word, states) {
      const limit = Math.min(word.length, P);
      const candidates = [];
      for (let i = 0; i <= limit; i++) {
        for (let j = i + 1; j <= limit; j++) {
          if (states[i] === states[j]) {
            candidates.push({
              i,
              j,
              repeatedState: states[i],
              x: word.slice(0, i),
              y: word.slice(i, j),
              z: word.slice(j)
            });
          }
        }
      }
      return candidates;
    }

    function renderSeg(word, chosen) {
      if (!chosen) {
        segArea.innerHTML = '';
        xyzArea.innerHTML = '';
        return;
      }
      const x = escapeHTML(chosen.x || 'ε');
      const y = escapeHTML(chosen.y || 'ε');
      const z = escapeHTML(chosen.z || 'ε');
      const rawX = escapeHTML(chosen.x);
      const rawY = escapeHTML(chosen.y);
      const rawZ = escapeHTML(chosen.z);

      segArea.innerHTML = `
        <div class="seg">
          <span class="piece">${rawX || '<span title="空串">ε</span>'}</span><span class="piece pump">${rawY || '<span title="空串">ε</span>'}</span><span class="piece">${rawZ || '<span title="空串">ε</span>'}</span>
        </div>
        <div class="small">上面高亮的黄色部分就是建议被“泵”的子串 <span class="mono">y</span>。</div>
      `;

      xyzArea.innerHTML = `
        <div class="xyz">
          <div class="box"><div class="lab">x</div><div class="mono">${x}</div></div>
          <div class="box"><div class="lab">y（可泵段）</div><div class="mono">${y}</div></div>
          <div class="box"><div class="lab">z</div><div class="mono">${z}</div></div>
        </div>
      `;
    }

    function renderExplain(chosen, accepted, wordLength) {
      if (!accepted) {
        explainArea.innerHTML = `
          <div class="explain">
            该串没有被这个 DFA 接受，因此它不属于该语言，页面不会给出 pumping 分解。
          </div>
        `;
        return;
      }
      if (!chosen) {
        explainArea.innerHTML = `
          <div class="explain">
            该串虽然被接受，但长度为 <span class="mono">${wordLength}</span>，小于 pumping length <span class="mono">p=3</span>，因此不满足“由泵引理保证一定存在可泵分解”的前提。<br>
            换句话说：这时页面不会强行指定一个被泵位置。
          </div>
        `;
        return;
      }

      const demo0 = escapeHTML(chosen.x + chosen.z || 'ε');
      const demo2 = escapeHTML(chosen.x + chosen.y + chosen.y + chosen.z || 'ε');
      const demo3 = escapeHTML(chosen.x + chosen.y + chosen.y + chosen.y + chosen.z || 'ε');

      explainArea.innerHTML = `
        <div class="explain">
          在前 <span class="mono">p=3</span> 个字符对应的运行前缀里，状态 <span class="mono">${chosen.repeatedState}</span> 在位置 <span class="mono">${chosen.i}</span> 和 <span class="mono">${chosen.j}</span> 处重复出现。<br>
          因此把串分解为 <span class="mono">w = xyz</span>，其中 <span class="mono">x = ${escapeHTML(chosen.x || 'ε')}</span>，<span class="mono">y = ${escapeHTML(chosen.y)}</span>，<span class="mono">z = ${escapeHTML(chosen.z || 'ε')}</span>。<br>
          由于读完 <span class="mono">y</span> 后 DFA 又回到了同一个状态，所以 <span class="mono">y</span> 可以重复任意多次：<br>
          <span class="mono">xy<sup>0</sup>z = ${demo0}</span>，
          <span class="mono">xy<sup>2</sup>z = ${demo2}</span>，
          <span class="mono">xy<sup>3</sup>z = ${demo3}</span>。
        </div>
      `;
    }

    function renderCandidates(candidates) {
      if (!candidates.length) {
        candidatesArea.innerHTML = '';
        return;
      }
      const items = candidates.map((c, idx) => `
        <div class="candidate">
          <strong>方案 ${idx + 1}</strong>：重复状态 <span class="mono">${c.repeatedState}</span>，
          位置 <span class="mono">${c.i}</span> 到 <span class="mono">${c.j}</span>，
          即 <span class="mono">x=${escapeHTML(c.x || 'ε')}</span>，
          <span class="mono">y=${escapeHTML(c.y)}</span>，
          <span class="mono">z=${escapeHTML(c.z || 'ε')}</span>。
        </div>
      `).join('');
      candidatesArea.innerHTML = `
        <h2 style="font-size:18px; margin:14px 0 8px;">其他可选泵点</h2>
        <div class="candidate-list">${items}</div>
      `;
    }

    function renderRunTable(word, sim, chosen) {
      const rows = [];
      rows.push(`
        <tr>
          <td>0</td>
          <td class="mono">ε</td>
          <td class="mono">q0</td>
          <td>初始状态</td>
        </tr>
      `);

      for (let i = 0; i < sim.transitions.length; i++) {
        const t = sim.transitions[i];
        const prefix = escapeHTML(word.slice(0, i + 1) || 'ε');
        rows.push(`
          <tr>
            <td>${i + 1}</td>
            <td class="mono">${prefix}</td>
            <td class="mono">${t.to}</td>
            <td class="mono">${t.from} --${t.ch}--> ${t.to}</td>
          </tr>
        `);
      }

      runTable.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>位置 i</th>
              <th>已读入前缀</th>
              <th>当前状态</th>
              <th>转移</th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      `;
    }

    function highlightStates(sim, chosen) {
      const groups = ['q0', 'q1', 'q2'].map(q => document.getElementById('state-' + q));
      groups.forEach(g => g.classList.remove('hit', 'repeat'));

      const visited = new Set(sim.states);
      visited.forEach(q => document.getElementById('state-' + q).classList.add('hit'));

      if (chosen) {
        const el = document.getElementById('state-' + chosen.repeatedState);
        el.classList.add('repeat');
      }
    }

    function analyze() {
      const word = wordInput.value.trim();

      if (word === '') {
        showStatus('warn', '请输入一个 0/1 串。');
        segArea.innerHTML = '';
        xyzArea.innerHTML = '';
        explainArea.innerHTML = '';
        candidatesArea.innerHTML = '';
        runTable.innerHTML = '';
        highlightStates({ states: ['q0'] }, null);
        return;
      }

      if (!/^[01]+$/.test(word)) {
        showStatus('bad', '输入不合法：只能包含字符 0 和 1。');
        segArea.innerHTML = '';
        xyzArea.innerHTML = '';
        explainArea.innerHTML = '';
        candidatesArea.innerHTML = '';
        runTable.innerHTML = '';
        highlightStates({ states: ['q0'] }, null);
        return;
      }

      const sim = simulate(word);
      const candidates = sim.accepted ? findCandidates(word, sim.states) : [];
      const chosen = candidates.length ? candidates[0] : null;

      if (!sim.accepted) {
        showStatus('bad', `结果：该串被拒绝，最终停在 ${sim.finalState}，因此它不是这个 DFA 的合法串。`);
      } else if (!chosen) {
        showStatus('warn', `结果：该串被接受，最终停在 ${sim.finalState}；但长度不足 p=3，当前不强制给出 pumping 分解。`);
      } else {
        showStatus('ok', `结果：该串被接受，最终停在 ${sim.finalState}。已找到一个可泵分解。`);
      }

      renderSeg(word, chosen);
      renderExplain(chosen, sim.accepted, word.length);
      renderCandidates(candidates.slice(1));
      renderRunTable(word, sim, chosen);
      highlightStates(sim, chosen);
    }

    analyzeBtn.addEventListener('click', analyze);
    clearBtn.addEventListener('click', () => {
      wordInput.value = '';
      analyze();
      wordInput.focus();
    });
    wordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') analyze();
    });

    document.querySelectorAll('[data-example]').forEach(btn => {
      btn.addEventListener('click', () => {
        wordInput.value = btn.getAttribute('data-example');
        analyze();
      });
    });

    analyze();
  </script>
</body>
</html>
