<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路径迭代法：动态演示 (k=0, 1, 2)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .svg-container {
            margin: 20px 0;
            background-color: #fafbfc;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 20px;
        }
        
        /* SVG 样式与动画过渡 */
        circle, path, text {
            transition: all 0.5s ease-in-out;
        }
        .state {
            fill: #ecf0f1;
            stroke: #bdc3c7;
            stroke-width: 3;
        }
        .state-text {
            font-size: 20px;
            font-weight: bold;
            fill: #7f8c8d;
        }
        .edge {
            fill: none;
            stroke: #bdc3c7;
            stroke-width: 3;
            marker-end: url(#arrow-gray);
        }
        .edge-label {
            font-size: 18px;
            fill: #7f8c8d;
            font-weight: bold;
        }

        /* 激活状态的高亮样式 */
        .active-state {
            fill: #d5f5e3;
            stroke: #2ecc71;
        }
        .active-state-text {
            fill: #27ae60;
        }
        .active-edge {
            stroke: #e74c3c;
            stroke-width: 4;
            marker-end: url(#arrow-red);
        }
        .active-edge-label {
            fill: #c0392b;
            font-size: 22px;
        }

        /* 按钮和文本面板 */
        .controls {
            margin-top: 20px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            box-shadow: none;
        }
        .explanation {
            margin-top: 25px;
            padding: 20px;
            background-color: #e8f4f8;
            border-left: 6px solid #3498db;
            text-align: left;
            border-radius: 4px;
            min-height: 120px;
        }
        .formula {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em;
            font-weight: bold;
            color: #d35400;
            background: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 10px;
        }
        /* 优化上标的显示位置 */
        sup {
            font-size: 0.75em;
            line-height: 0;
            vertical-align: baseline;
            position: relative;
            top: -0.5em;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>状态机到正则表达式：中转状态 k 的放宽过程</h2>
    <p class="subtitle">直观理解 R<sub>ij</sub><sup>(k)</sup> 到底在计算什么路径</p>

    <div class="svg-container">
        <svg width="500" height="250" viewBox="0 0 500 250">
            <defs>
                <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#bdc3c7" />
                </marker>
                <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c" />
                </marker>
            </defs>

            <path id="edge-1-1" class="edge" d="M 135 125 C 100 50 200 50 165 125" />
            <text id="label-1-1" x="140" y="65" class="edge-label">0</text>

            <path id="edge-2-2" class="edge" d="M 335 125 C 300 50 400 50 365 125" />
            <text id="label-2-2" x="340" y="65" class="edge-label">1</text>

            <path id="edge-1-2" class="edge" d="M 180 140 Q 250 100 320 140" />
            <text id="label-1-2" x="245" y="115" class="edge-label">1</text>

            <path id="edge-2-1" class="edge" d="M 320 160 Q 250 200 180 160" />
            <text id="label-2-1" x="245" y="195" class="edge-label">0</text>

            <circle id="state-1" cx="150" cy="150" r="30" class="state" />
            <text id="text-1" x="150" y="157" text-anchor="middle" class="state-text">1</text>
            <path d="M 80 150 L 110 150" fill="none" stroke="#bdc3c7" stroke-width="3" marker-end="url(#arrow-gray)"/>

            <circle id="state-2" cx="350" cy="150" r="30" class="state" />
            <circle id="state-2-inner" cx="350" cy="150" r="24" class="state" fill="none"/>
            <text id="text-2" x="350" y="157" text-anchor="middle" class="state-text">2</text>
        </svg>
    </div>

    <div class="controls">
        <button id="btn-prev" onclick="changeStep(-1)" disabled>⬅ 上一步</button>
        <button id="btn-next" onclick="changeStep(1)">下一步 (k=0) ➡</button>
    </div>

    <div class="explanation" id="explanation-box">
        <h3 id="exp-title" style="margin-top: 0; color: #2c3e50;">准备开始</h3>
        <p id="exp-text">点击“下一步”查看从状态 1 到状态 2 的路径，随着允许的中转状态集合 {1, ..., k} 的扩大，路径表达式是如何逐步生成的。</p>
        <div id="exp-formula" class="formula" style="display: none;"></div>
    </div>
</div>

<script>
    let currentStep = -1;

    const steps = [
        {
            title: "第 0 步 (k = 0)：不允许任何状态作为中转",
            text: "此时只能寻找从 1 直接指向 2 的连线。不能经过任何中间状态，甚至不能在出发点或终点兜圈子。这就是递推的【基础情况】。",
            formula: "R<sub>12</sub><sup>(0)</sup> = 1",
            highlights: {
                states: ["state-1", "text-1", "state-2", "state-2-inner", "text-2"],
                edges: ["edge-1-2"],
                labels: ["label-1-2"]
            }
        },
        {
            title: "第 1 步 (k = 1)：允许【状态 1】作为中转站",
            text: "现在放宽限制：在前往状态 2 之前，允许在【状态 1】停留或循环。因此，可以在状态 1 走任意次 0，最后再走 1 到达状态 2。",
            formula: "R<sub>12</sub><sup>(1)</sup> = 0*1",
            highlights: {
                states: ["state-1", "text-1", "state-2", "state-2-inner", "text-2"],
                edges: ["edge-1-1", "edge-1-2"],
                labels: ["label-1-1", "label-1-2"]
            }
        },
        {
            title: "第 2 步 (k = 2)：允许【状态 1 和状态 2】作为中转站",
            text: "进一步放宽限制：到达状态 2 后，还可以继续利用状态 1 或状态 2 进行跳转。所有的边都被激活了，这构成了最终的正则表达式！",
            formula: "R<sub>12</sub><sup>(2)</sup> = 0*1 ( 1 + 0 0*1 )*",
            highlights: {
                states: ["state-1", "text-1", "state-2", "state-2-inner", "text-2"],
                edges: ["edge-1-1", "edge-2-2", "edge-1-2", "edge-2-1"],
                labels: ["label-1-1", "label-2-2", "label-1-2", "label-2-1"]
            }
        }
    ];

    function changeStep(delta) {
        currentStep += delta;
        updateUI();
    }

    function updateUI() {
        // 更新按钮状态
        document.getElementById("btn-prev").disabled = (currentStep === -1);
        document.getElementById("btn-next").disabled = (currentStep === steps.length - 1);
        
        if (currentStep < steps.length - 1) {
            document.getElementById("btn-next").innerText = `下一步 (k=${currentStep + 1}) ➡`;
        } else {
            document.getElementById("btn-next").innerText = "已到最后一步";
        }

        // 重置所有元素的样式
        document.querySelectorAll('.state').forEach(el => {
            el.classList.remove('active-state');
            // 恢复默认填充色
            if(el.id === "state-2-inner") {
                el.style.fill = "none";
            } else {
                el.style.fill = "#ecf0f1";
            }
        });
        document.querySelectorAll('.state-text').forEach(el => el.classList.remove('active-state-text'));
        document.querySelectorAll('.edge').forEach(el => el.classList.remove('active-edge'));
        document.querySelectorAll('.edge-label').forEach(el => el.classList.remove('active-edge-label'));

        if (currentStep === -1) {
            document.getElementById("exp-title").innerText = "准备开始";
            document.getElementById("exp-text").innerText = "点击“下一步”查看从状态 1 到状态 2 的路径，随着允许的中转状态集合 {1, ..., k} 的扩大，路径表达式是如何逐步生成的。";
            document.getElementById("exp-formula").style.display = "none";
            return;
        }

        // 获取当前步骤的数据
        const stepData = steps[currentStep];

        // 更新文本面板
        document.getElementById("exp-title").innerText = stepData.title;
        document.getElementById("exp-text").innerText = stepData.text;
        // 这里改为了 innerHTML，以便渲染 <sub> 和 <sup> 标签
        document.getElementById("exp-formula").innerHTML = stepData.formula;
        document.getElementById("exp-formula").style.display = "inline-block";

        // 高亮对应的 SVG 元素
        stepData.highlights.states.forEach(id => {
            document.getElementById(id).classList.add('active-state');
        });
        stepData.highlights.edges.forEach(id => {
            document.getElementById(id).classList.add('active-edge');
        });
        stepData.highlights.labels.forEach(id => {
            document.getElementById(id).classList.add('active-edge-label');
        });
    }
</script>

</body>
</html>
